// ── CALC ───────────────────────────────────────────────────────────────────
function toBRL(v){if(v==null||isNaN(v))return"—";return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v);}
function mlCF(p){return p<29?5.5:p<55?6.5:p<109?8:p<199?10:0;}
function shFee(p){return p<8?p*0.5:p<80?p*0.2+4:p<100?p*0.14+16:p<200?p*0.14+20:p*0.14+26;}
function mkP(c,f,t){if(t>=0.999)return null;return(c+f)/(1-t);}
function calcML(c,f,r,mg){var P=mkP(c,f,r+0.0299+mg);if(!P)return null;for(var i=0;i<15;i++){var Pn=(c+f+mlCF(P))/(1-r-0.0299-mg);if(Math.abs(Pn-P)<0.001){P=Pn;break;}P=Pn;}return P>0?P:null;}
function calcSh(c,f,mg){var P=(c+f)*2.5;for(var i=0;i<80;i++){var Pn=c+f+shFee(P)+P*mg;if(Math.abs(Pn-P)<0.001){P=Pn;break;}P=Pn;}return P>0?P:null;}
function feeFor(mp,pv,tx){if(mp.t==="ml")return pv*tx[mp.r]+mlCF(pv)+pv*0.0299;if(mp.t==="sh")return shFee(pv);return pv*tx[mp.r];}
function calcAll(c,f,mg,tx){
  var list=[
    {key:"mlc",P:calcML(c,f,tx[0],mg)},{key:"mlp",P:calcML(c,f,tx[1],mg)},
    {key:"sh", P:calcSh(c,f,mg)},
    {key:"amz",P:mkP(c,f,tx[2]+mg)},{key:"mag",P:mkP(c,f,tx[3]+mg)},{key:"ame",P:mkP(c,f,tx[4]+mg)},
  ];
  return list.filter(function(m){return m.P&&m.P>0;}).sort(function(a,b){return a.P-b.P;});
}

// Estimativa inteligente de mercado baseada no custo e categoria
function estimarMercado(nome,cat,custoNum){
  var mult={eletronicos:2.8,informatica:2.5,eletrodomesticos:2.2,moda:3.5,beleza:3.2,casa:2.8,brinquedos:3.0,esportes:2.7,ferramentas:2.4,pets:3.0,games:2.3,livros:2.5,alimentos:2.2};

    alimentos:"Validade, ingredientes e certificações são obrigatórios. Foto do rótulo ajuda.",

  (state.tab==="register"?'<p style="text-align:center;font-size:12px;color:#06B6D4;margin-top:8px">✨ 3 dias de trial grátis · Sem cartão</p>':"")+'<p style="text-align:center;font-size:11px;color:#3E3D52;margin-top:12px">Admin: admin@dropwise.ai / admin123</p></div></div>';
}
