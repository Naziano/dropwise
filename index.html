function brl(v){if(v==null||isNaN(v))return"—";return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v);}
function mlCF(p){return p<29?5.5:p<55?6.5:p<109?8:p<199?10:0;}
function shF(p){return p<8?p*.5:p<80?p*.2+4:p<100?p*.14+16:p<200?p*.14+20:p*.14+26;}
function mkP(c,f,t){if(t>=.999)return null;return(c+f)/(1-t);}
function cML(c,f,r,mg){var P=mkP(c,f,r+.0299+mg);if(!P)return null;for(var i=0;i<15;i++){var Pn=(c+f+mlCF(P))/(1-r-.0299-mg);if(Math.abs(Pn-P)<.001){P=Pn;break;}P=Pn;}return P>0?P:null;}
function cSh(c,f,mg){var P=(c+f)*2.5;for(var i=0;i<80;i++){var Pn=c+f+shF(P)+P*mg;if(Math.abs(Pn-P)<.001){P=Pn;break;}P=Pn;}return P>0?P:null;}
function fee(mp,pv,tx){if(mp.t==="ml")return pv*tx[mp.r]+mlCF(pv)+pv*.0299;if(mp.t==="sh")return shF(pv);return pv*tx[mp.r];}
function calcAll(c,f,mg,tx){
  var r=[{key:"mlc",P:cML(c,f,tx[0],mg)},{key:"mlp",P:cML(c,f,tx[1],mg)},{key:"sh",P:cSh(c,f,mg)},{key:"amz",P:mkP(c,f,tx[2]+mg)},{key:"mag",P:mkP(c,f,tx[3]+mg)},{key:"ame",P:mkP(c,f,tx[4]+mg)}];
  return r.filter(function(m){return m.P&&m.P>0;}).sort(function(a,b){return a.P-b.P;});
}

  return{preco_medio:med,faixa_min:Math.round(med*.75),faixa_max:Math.round(med*1.35),melhor_mp:["eletronicos","games","informatica"].includes(cat)?"Mercado Livre":["moda","beleza"].includes(cat)?"Shopee":"Mercado Livre",motivo:"Maior volume de buscas para esta categoria no Brasil.",concorrencia:custo<30?"Alta":custo<80?"Média":"Baixa",dica:dicas[cat]||"Invista em fotos profissionais e descrição detalhada.",viabilidade:custo<20?"Regular":custo<50?"Boa":"Excelente",_est:true};
}

function doAuth(){
  var e=(S.authEmail||"").trim(),p=S.authPass||"",n=(S.authName||"").trim();
  ss({authErr:"",ldAuth:true});
  setTimeout(function(){
    if(S.tab==="register"){
      if(!n||!e||!p){ss({authErr:"Preencha todos os campos.",ldAuth:false});return;}
      if(p.length<8){ss({authErr:"Senha mínimo 8 caracteres.",ldAuth:false});return;}
      if(DB.find(e)){ss({authErr:"E-mail já cadastrado.",ldAuth:false});return;}
      var u=DB.create(n,e,p);toast("Conta criada! Trial de 3 dias ativado ✨");
      ss({user:u,view:"app",scr:"home",ldAuth:false});
    }else{
      if(!e||!p){ss({authErr:"Preencha e-mail e senha.",ldAuth:false});return;}

}
